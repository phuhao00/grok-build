name: Release desktop (bony-build)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload assets to (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: bony-build.exe
            zip_suffix: windows-x86_64
          - name: macos-aarch64
            os: macos-14
            target: aarch64-apple-darwin
            artifact: bony-build
            zip_suffix: macos-aarch64
          # Cross-compile Intel Mac on macos-14 — macos-13 runners queue for a long time.
          - name: macos-x86_64
            os: macos-14
            target: x86_64-apple-darwin
            artifact: bony-build
            zip_suffix: macos-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92.0"
          targets: ${{ matrix.target }}

      - name: Build bony-build (release-dist)
        run: cargo build -p bony-build --profile release-dist --target ${{ matrix.target }}

      - name: Package zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "${{ inputs.tag }}"
          } else {
            "${{ github.ref_name }}"
          }
          $stage = "dist"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "target/${{ matrix.target }}/release-dist/${{ matrix.artifact }}" $stage/
          $zip = "bony-build-$tag-${{ matrix.zip_suffix }}.zip"
          Compress-Archive -Path "$stage/*" -DestinationPath $zip -Force
          echo "ASSET_PATH=$zip" >> $env:GITHUB_ENV
          echo "RELEASE_TAG=$tag" >> $env:GITHUB_ENV

      - name: Package zip (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          stage=dist
          mkdir -p "$stage"
          cp "target/${{ matrix.target }}/release-dist/${{ matrix.artifact }}" "$stage/"
          chmod +x "$stage/${{ matrix.artifact }}"
          zip_name="bony-build-${TAG}-${{ matrix.zip_suffix }}.zip"
          (cd "$stage" && zip -9 "../${zip_name}" "${{ matrix.artifact }}")
          echo "ASSET_PATH=${zip_name}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=${TAG}" >> "$GITHUB_ENV"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Bony Build ${{ env.RELEASE_TAG }}
          draft: false
          prerelease: false
          generate_release_notes: true
          # Allow re-running the workflow to replace existing zip assets.
          overwrite_files: true
          body: |
            Desktop client binaries for **Bony Build** `${{ env.RELEASE_TAG }}`.

            ## Assets
            - `bony-build-*-windows-x86_64.zip` — Windows x86_64 (`bony-build.exe`)
            - `bony-build-*-macos-aarch64.zip` — macOS Apple Silicon
            - `bony-build-*-macos-x86_64.zip` — macOS Intel

            ## Requirements
            The desktop shell drives a local `grok` agent process over ACP stdio.
            Install `grok` separately, for example:

            ```bash
            npm i -g @xai-official/grok
            ```

            Or pass an explicit path: `bony-build --grok-bin /path/to/grok`.
          files: ${{ env.ASSET_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
