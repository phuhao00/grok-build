# Curated product features for bony-monitor (hot-reloaded at runtime).

[[features]]
id = "chat"
name = "对话交互"
category = "桌面体验"
description = "消息发送、流式回复、时间线、悬浮输入框"
user_facing = true
paths = [
  "crates/codegen/bony-build/src/app.rs",
  "crates/codegen/bony-build/src/model.rs",
  "crates/codegen/bony-build/src/markdown.rs",
  "crates/codegen/bony-build/src/events.rs",
]
names = ["markdown.rs", "events.rs"]
keywords = ["chat", "composer", "timeline", "对话", "发送", "floating_composer", "enter"]
severity = "high"
user_impact = "直接影响用户如何提问与阅读回复"

